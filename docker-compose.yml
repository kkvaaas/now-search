services:
  app:
    build: .
    container_name: now-search-app
    ports:
      - "8080:8080"
    environment:
      NATS_URL: nats://nats:4222
    depends_on:
      - nats

  nats:
    image: nats:latest
    container_name: now-search-nats
    ports:
      - "4222:4222"
      - "8222:8222"
    command: ["-m", "8222"]